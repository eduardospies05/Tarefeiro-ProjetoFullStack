<div class="container mt-3">
    <h1>Adicionar Tarefa</h1>
    <div class="mt-3">
        <form #form="ngForm" (ngSubmit)="onSubmit()">
            <div class="mt-2">
                <label for="" class="form-label">
                    Nome
                </label>
                <input type="text" class="form-control"
                       name="comentario" [(ngModel)]="create.comentario">
            </div>
            <div class="mt-2">
                <label for="" class="form-label">
                    Status
                </label>
                <select id="" class="form-select"
                        name="statusId" 
                        [(ngModel)]="create.statusId">
                    @if(status$ | async; as status) {
                        @for(st of status.data; track st.id) {
                            <option [value]="st.id">
                                {{st.nome}}
                            </option>
                        }
                    }
                </select>
            </div>
            <div class="mt-2">
                <label for="" class="form-label">
                    Categoria
                </label>
                <select name="categoriaId" [(ngModel)]="create.categoriaId" class="form-select">
                    @if(categorias$ | async; as categorias) {
                        @for(ct of categorias.data; track ct.id) {
                            <option [value]="ct.id">
                                {{ct.nome}}
                            </option>
                        }
                    }
                </select>
            </div>
            <div class="d-flex align-items-center mt-4 gap-2">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a class="btn btn-primary" routerLink="/tarefas">
                    Voltar
                </a>
            </div>
        </form>
    </div>
</div>
